<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Zara FM">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW falhou, mas a rádio segue viva:', err));
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zara FM | A Rádio mais felina de todas!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #efa39a; 
            --primary-brown: #462c26; 
            --light-pink: #f7cac9;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fredoka', sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--primary-brown);
            background-image: radial-gradient(var(--light-pink) 1px, transparent 1px);
            background-size: 20px 20px; padding-bottom: 50px;
        }
        header {
            background-color: var(--primary-brown); color: var(--white);
            padding: 15px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px;
        }
        header h1 { font-size: 1.8rem; letter-spacing: 2px; }
        .main-wrapper {
            max-width: 1000px; margin: 0 auto; display: grid;
            grid-template-columns: 1fr 1fr; gap: 30px; padding: 0 20px; align-items: start;
        }
        @media (max-width: 768px) { .main-wrapper { grid-template-columns: 1fr; } }
        .player-box {
            background: var(--glass-bg); backdrop-filter: blur(10px); padding: 30px 20px;
            border-radius: 30px; box-shadow: 0 15px 35px rgba(70, 44, 38, 0.2);
            border: 2px solid rgba(70, 44, 38, 0.1); text-align: center;
        }
        .logo-container { margin-bottom: 25px; display: flex; justify-content: center; }
        .logo-container img {
            width: 100%; max-width: 250px; border-radius: 20px;
            filter: drop-shadow(0 15px 25px rgba(70, 44, 38, 0.4));
        }
        .status { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .live-dot { width: 12px; height: 12px; background-color: #ff4757; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }
        .now-playing { background-color: rgba(70, 44, 38, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 25px; width: 100%; }
        .now-playing p { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.8; }
        .now-playing h3 { font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-controls {
            display: flex; flex-direction: column; gap: 20px; align-items: center;
            background: rgba(255, 255, 255, 0.2); padding: 20px; border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }
        .play-row { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; }
        .play-btn {
            background-color: var(--primary-brown); border: none; width: 65px; height: 65px;
            border-radius: 50%; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(70, 44, 38, 0.4); display: flex; align-items: center; justify-content: center;
        }
        .play-btn:hover { transform: scale(1.05); background-color: #311f1a; }
        .play-btn:active { transform: scale(0.95); }
        .play-btn svg { fill: #ffffff !important; }
        .volume-container svg { fill: var(--primary-brown) !important; }
        .visualizer { display: flex; gap: 4px; height: 30px; align-items: flex-end; opacity: 0; width: 40px; justify-content: center; }
        .visualizer.active { opacity: 1; }
        .bar { width: 5px; background-color: var(--primary-brown); border-radius: 3px; height: 5px; }
        .visualizer.active .bar { animation: bounce 0.5s infinite alternate; }
        .visualizer.active .bar:nth-child(2) { animation-delay: 0.1s; }
        .visualizer.active .bar:nth-child(3) { animation-delay: 0.2s; }
        .visualizer.active .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes bounce { 0% { height: 5px; } 100% { height: 30px; } }

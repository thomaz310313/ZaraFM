<script>
        const audio = document.getElementById('audioStream');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconContainer = document.getElementById('iconContainer');
        const volumeSlider = document.getElementById('volumeSlider');
        const statusText = document.getElementById('statusText');
        const liveIndicator = document.getElementById('liveIndicator');
        const visualizer = document.getElementById('visualizer');
        const songTitleText = document.getElementById('songTitle');

        const playSvg = '<svg viewBox="0 0 24 24" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>';
        const pauseSvg = '<svg viewBox="0 0 24 24" width="28" height="28"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

        let isPlaying = false;

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                audio.src = ""; 
                iconContainer.innerHTML = playSvg;
                statusText.innerText = "Pausado";
                liveIndicator.style.display = "none";
                visualizer.classList.remove('active');
                isPlaying = false;
            } else {
                statusText.innerText = "Conectando...";
                const urlAoVivo = "https://radio.zarafm.xyz/aovivo?_=" + new Date().getTime();
                audio.src = urlAoVivo;

                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        iconContainer.innerHTML = pauseSvg;
                        statusText.innerText = "Ao Vivo";
                        liveIndicator.style.display = "block";
                        visualizer.classList.add('active');
                        isPlaying = true;
                        buscarNomeDaMusica();
                    }).catch((error) => {
                        console.error("Erro:", error);
                        statusText.innerText = "Erro. Tente novamente";
                        iconContainer.innerHTML = playSvg;
                        isPlaying = false;
                    });
                }
            }
        });

        volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

        audio.addEventListener('error', () => {
            if (isPlaying) {
                statusText.innerText = "Sinal Perdido";
                liveIndicator.style.display = "none";
                visualizer.classList.remove('active');
                iconContainer.innerHTML = playSvg;
                isPlaying = false;
            }
        });

        async function buscarNomeDaMusica() {
            if (!isPlaying) return;

            try {
                // O ?nocache= com a hora obriga a Cloudflare a pegar o nome NOVO a cada 10 segundos
                const urlStatus = 'https://radio.zarafm.xyz/status-json.xsl?nocache=' + new Date().getTime();
                const resposta = await fetch(urlStatus);
                const dados = await resposta.json();

                let titulo = "";

                // Verifica se o Icecast mandou os dados
                if (dados.icestats && dados.icestats.source) {
                    let fonte = Array.isArray(dados.icestats.source) ? dados.icestats.source[0] : dados.icestats.source;
                    
                    // O PULO DO GATO: Agora ele caça o nome dentro do metadata primeiro!
                    if (fonte.metadata && fonte.metadata.x_icy_title) {
                        titulo = fonte.metadata.x_icy_title;
                    } else if (fonte.title) {
                        titulo = fonte.title;
                    }

                    if (titulo) {
                        // 1. Limpa horários e atalhos do ZaraRadio (separa pelo TAB e pega o último)
                        titulo = titulo.split('\t').pop();

                        // 2. Mata o diretório do Windows (Remove tudo antes da última barra)
                        titulo = titulo.split('\\').pop().split('/').pop();
                        
                        // 3. Mata o "_spotdown.org", "_spotdown" e extensões de áudio
                        titulo = titulo.replace(/_spotdown\.org|_spotdown/gi, "");
                        titulo = titulo.replace(/\.mp3|\.webm|\.m4a|\.wav/gi, "");
                        
                        // 4. Limpa os espaços e hífens sobrando
                        titulo = titulo.trim().replace(/^-+|-+$/g, '');
                    }
                }

                // Só atualiza se o título final não estiver vazio
                if (titulo && titulo !== "") {
                    songTitleText.innerText = titulo;
                } else {
                    songTitleText.innerText = "Zara FM - 106.9";
                }
            } catch (erro) {
                console.error("Erro ao buscar metadados:", erro);
                songTitleText.innerText = "Transmissão Ao Vivo";
            }

            setTimeout(buscarNomeDaMusica, 10000);
        }

            setTimeout(buscarNomeDaMusica, 10000);
        }
    </script>

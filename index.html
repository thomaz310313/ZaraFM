<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zara FM | No Ar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #efa39a; 
            --primary-brown: #462c26; 
            --light-pink: #f7cac9;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--primary-brown);
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(70, 44, 38, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid rgba(70, 44, 38, 0.1);
        }

        .logo-container img {
            width: 250px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(70, 44, 38, 0.3));
        }

        .status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            background-color: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
        }

        .play-btn {
            background-color: var(--primary-brown);
            color: var(--white);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(70, 44, 38, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.05);
            background-color: #311f1a;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .volume-container i {
            color: var(--primary-brown);
            font-size: 1.2rem;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--primary-brown);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--light-pink);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="3697.webp" alt="Logo Zara FM" onerror="this.style.display='none'">
        </div>

        <div class="status">
            <div class="live-dot" id="liveIndicator" style="display: none;"></div>
            <span id="statusText">Rádio Online</span>
        </div>

        <div class="player-controls">
            <button class="play-btn" id="playPauseBtn">
                <i class="fas fa-play" id="playIcon"></i>
            </button>

            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>
    </div>

    <audio id="audioStream" preload="none"></audio>

    <script>
        const audio = document.getElementById('audioStream');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const statusText = document.getElementById('statusText');
        const liveIndicator = document.getElementById('liveIndicator');

        let isPlaying = false;

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                // Comando de Pausa
                audio.pause();
                audio.src = ""; // Corta a conexão com o túnel
                
                playIcon.className = 'fas fa-play';
                statusText.innerText = "Pausado";
                liveIndicator.style.display = "none";
                isPlaying = false;
            } else {
                // Comando de Play (com sistema anticache embutido)
                statusText.innerText = "Conectando...";
                
                // Força o link real com um parâmetro de tempo para enganar o cache
                const urlAoVivo = "https://radio.zarafm.xyz/aovivo?_=" + new Date().getTime();
                audio.src = urlAoVivo;
                
                // Usa promise para evitar travamentos do navegador
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // Tocou com sucesso
                        playIcon.className = 'fas fa-pause';
                        statusText.innerText = "Ao Vivo";
                        liveIndicator.style.display = "block";
                        isPlaying = true;
                    }).catch((error) => {
                        // Foi bloqueado
                        console.error("Erro ao reproduzir:", error);
                        statusText.innerText = "Erro. Tente novamente";
                        playIcon.className = 'fas fa-play';
                        isPlaying = false;
                    });
                }
            }
        });

        // Controle de Volume
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Captura de queda de conexão
        audio.addEventListener('error', () => {
            if (isPlaying) {
                statusText.innerText = "Sinal Perdido";
                liveIndicator.style.display = "none";
                playIcon.className = 'fas fa-play';
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
